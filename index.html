<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="title-overlay">
    <h1>Antigravity</h1>
    <p>Click anywhere to add elements &bull; Drag to throw them around</p>
  </div>

  <div id="controls">
    <button id="btn-gravity">&#11015; Gravity Down</button>
    <button id="btn-explode">&#128165; Explode</button>
    <button id="btn-add">+ Add Element</button>
    <button id="btn-clear">&#128465; Clear</button>
  </div>

  <div id="counter">0 elements</div>

  <script src="script.js"></script>
</body>
</html>
